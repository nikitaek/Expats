openapi: 3.1.0
info:
  title: Flight Scheduler V2 API
  version: 2.0.0
  description: FR24-only pipeline API for Vietnam inbound flight analysis.
servers:
  - url: https://api.example.com
security:
  - ApiKeyAuth: []
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Job:
      type: object
      required: [id, type, status, createdAt]
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - fr24.routes.fetch
            - fr24.inbound.fetch
            - fr24.outbound.fetch
            - fr24.flight-number.fetch
            - parse.raw-object
            - parse.prefix
            - index.canonical-object
            - index.prefix
            - enrich.flights
            - enrich.prefix
            - analyze.routes
            - analyze.inbound-origins
            - analyze.aircraft-vocabulary
            - analyze.flight-numbers
        status:
          type: string
          enum: [queued, running, succeeded, failed, skipped]
        dateFrom:
          type: string
          format: date
        dateTo:
          type: string
          format: date
        input:
          type: object
          additionalProperties: true
        outputPrefix:
          type: string
        error:
          type: string
        createdAt:
          type: string
          format: date-time
    Route:
      type: object
      required: [route, originIata, destinationIata, priority, status]
      properties:
        route:
          type: string
          example: ALA-DAD
        originIata:
          type: string
          example: ALA
        destinationIata:
          type: string
          example: DAD
        priority:
          type: integer
        status:
          type: string
          enum: [active, seasonal, candidate, monitor, low_priority, disabled]
        zeroResultCount:
          type: integer
        positiveResultCount:
          type: integer
        lastSeenAt:
          type: string
          format: date-time
        lastCheckedAt:
          type: string
          format: date-time
    Flight:
      type: object
      properties:
        id:
          type: string
        flightNumber:
          type: string
        airlineIata:
          type: string
        route:
          type: string
        originIata:
          type: string
        destinationIata:
          type: string
        actualDepartureAt:
          type: string
          format: date-time
        actualArrivalAt:
          type: string
          format: date-time
        aircraftCode:
          type: string
        aircraftRegistration:
          type: string
        paxEst:
          type: integer
        sourceMethods:
          type: array
          items:
            type: string
        confidence:
          type: integer
paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        "200":
          description: OK
  /v1/jobs:
    post:
      summary: Create a pipeline job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Job"
            examples:
              routeFetch:
                value:
                  type: fr24.routes.fetch
                  dateFrom: "2026-05-20"
                  dateTo: "2026-05-27"
                  input:
                    routes: [SVO-DAD, ALA-DAD, TAS-DAD]
      responses:
        "201":
          description: Job created
  /v1/jobs/{jobId}:
    get:
      summary: Get job status
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job status
  /v1/download/fr24/routes:
    post:
      summary: Fetch FR24 route batch and save raw output
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dateFrom, dateTo, routes]
              properties:
                dateFrom:
                  type: string
                  format: date
                dateTo:
                  type: string
                  format: date
                routes:
                  type: array
                  items:
                    type: string
                  example: [SVO-DAD, ALA-DAD, TAS-DAD]
      responses:
        "202":
          description: Download job accepted
  /v1/download/fr24/inbound:
    post:
      summary: Fetch FR24 inbound airport data and save raw output
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dateFrom, dateTo, airportIata]
              properties:
                dateFrom:
                  type: string
                  format: date
                dateTo:
                  type: string
                  format: date
                airportIata:
                  type: string
                  example: DAD
                maxPages:
                  type: integer
                  default: 5
      responses:
        "202":
          description: Download job accepted
  /v1/download/fr24/outbound:
    post:
      summary: Fetch FR24 outbound airport data and save raw output
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dateFrom, dateTo, airportIata]
              properties:
                dateFrom:
                  type: string
                  format: date
                dateTo:
                  type: string
                  format: date
                airportIata:
                  type: string
                  example: ALA
                maxPages:
                  type: integer
                  default: 10
      responses:
        "202":
          description: Download job accepted
  /v1/download/fr24/flight-number:
    post:
      summary: Fetch FR24 data for a known flight number and save raw output
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dateFrom, dateTo, flightNumber]
              properties:
                dateFrom:
                  type: string
                  format: date
                dateTo:
                  type: string
                  format: date
                flightNumber:
                  type: string
                  example: VJ8924
      responses:
        "202":
          description: Download job accepted
  /v1/parse/prefix:
    post:
      summary: Parse all raw FR24 objects under a prefix
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prefix]
              properties:
                prefix:
                  type: string
      responses:
        "202":
          description: Parse job accepted
  /v1/index/prefix:
    post:
      summary: Deduplicate canonical records under a prefix and update flight index
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prefix]
              properties:
                prefix:
                  type: string
      responses:
        "202":
          description: Index job accepted
  /v1/enrich/flights:
    post:
      summary: Enrich indexed flights with airport, airline, aircraft, and passenger metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dateFrom:
                  type: string
                  format: date
                dateTo:
                  type: string
                  format: date
                route:
                  type: string
      responses:
        "202":
          description: Enrichment job accepted
  /v1/flights:
    get:
      summary: Query normalized flights
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
        - name: originIata
          in: query
          schema:
            type: string
        - name: destinationIata
          in: query
          schema:
            type: string
        - name: route
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Normalized flights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Flight"
  /v1/summary/daily:
    get:
      summary: Daily passenger and flight summary
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Daily summary
  /v1/reports/discovered-origins:
    get:
      summary: List candidate origin airports discovered from inbound scans
      responses:
        "200":
          description: Discovered origins
